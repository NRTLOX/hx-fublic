{% if vm_instance and vm_instance.status == 'running' %}
<div class="alert alert-success shadow-sm" style="background-color: #1e3a2f; border-left: 5px solid #4ade80;">
    <h5 class="mb-3">Виртуальная машина запущена</h5>

    <div class="row">
        <div class="col-md-6">
            <strong>IP-адрес:</strong><br>
            <code class="fs-5 bg-dark px-3 py-1 rounded">{{ vm_instance.ip_address }}</code>
        </div>
        <div class="col-md-6">
            <strong>Осталось времени:</strong><br>
            <span id="countdown" class="fs-4 fw-bold text-success"></span>
        </div>
    </div>
</div>

<div class="d-grid gap-2 d-md-flex justify-content-md-start mt-3">
    <button onclick="resetTimer()"
            class="btn btn-outline-warning btn-lg px-4 shadow-sm">
        <i class="bi bi-clock-history"></i> Продлить таймер (+1 час)
    </button>

    <button onclick="stopVM()"
            id="stopBtn"
            class="btn btn-outline-danger btn-lg px-4 shadow-sm">
        <i class="bi bi-trash3"></i> Остановить машину
    </button>
</div>

<script>
    function startCountdown(expiryTime) {
        const countdownEl = document.getElementById('countdown');

        function updateTimer() {
            const now = new Date().getTime();
            const distance = expiryTime - now;

            if (distance < 0) {
                countdownEl.innerHTML = "Время вышло!";
                return;
            }

            const hours = Math.floor(distance / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            countdownEl.innerHTML = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        updateTimer();
        setInterval(updateTimer, 1000);
    }

    const expiryTimestamp = new Date("{{ vm_instance.expires_at.isoformat }}").getTime();
    startCountdown(expiryTimestamp);
</script>

{% else %}
<div class="alert alert-secondary shadow-sm" style="background-color: #3f3f46; border: none;">
    <p class="mb-0">Машина ещё не запущена. После запуска у вас будет 1 час работы.</p>
</div>
<button onclick="startVM()" id="startBtn" class="btn btn-primary btn-lg px-5">
    Запустить ВМ на 1 час
</button>
{% endif %}

<!-- Loading overlay -->
<div id="loadingOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center;">
    <div class="text-center">
        <div class="spinner-border text-light" role="status" style="width: 4rem; height: 4rem;">
            <span class="visually-hidden">Загрузка...</span>
        </div>
        <p class="text-white mt-3 fs-4" id="loadingText">Ожидайте...</p>
    </div>
</div>

<script>
function showLoading(text) {
    document.getElementById('loadingText').textContent = text;
    document.getElementById('loadingOverlay').style.display = 'flex';
}

function startVM() {
    if (confirm("Запустить виртуальную машину?")) {
        showLoading("Запускаем виртуальную машину...");
        window.location.href = "{% url 'vm_start' task.id %}";
    }
}
function stopVM() {
    if (confirm("Остановить машину?")) {
        showLoading("Останавливаем виртуальную машину...");
        window.location.href = "{% url 'vm_stop' task.id %}";
    }
}
function resetTimer() {
    if (confirm("Продлить таймер на 1 час?")) {
        window.location.href = "{% url 'vm_reset_timer' task.id %}";
    }
}
</script>
