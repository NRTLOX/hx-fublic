{% extends "admin/index.html" %}
{% load static %}

{% block content %}
<div style="margin-bottom: 20px;">
    <a href="{% url 'admin_monitoring' %}"
       style="display: inline-block;
              background: #22d3ee;
              color: #0f172a;
              padding: 12px 24px;
              border-radius: 10px;
              text-decoration: none;
              font-weight: 600;
              font-size: 16px;
              margin-right: 10px;">
        Мониторинг системы
    </a>

    <!-- Управление регистрацией -->
    {% load registration_tags %}
    {% get_registration_status as reg_status %}

    {% if not reg_status.is_open %}
        <form method="post" action="{% url 'admin:registration_open_unlimited' %}" style="display: inline-block;">
            {% csrf_token %}
            <button type="submit" style="background: #28a745; color: white; padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 16px;">
                Открыть регистрацию
            </button>
        </form>
    {% else %}
        <form method="post" action="{% url 'admin:registration_close' %}" style="display: inline-block;">
            {% csrf_token %}
            <button type="submit" style="background: #dc3545; color: white; padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 16px;">
                Закрыть регистрацию
            </button>
        </form>
    {% endif %}
</div>

{{ block.super }}
{% endblock %}
